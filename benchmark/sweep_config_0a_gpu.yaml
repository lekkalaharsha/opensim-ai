# benchmark/sweep_config_0a_gpu.yaml
# Phase 0A — GPU statevector sweep (Tesla T4)
#
# Companion to sweep_config_0a.yaml (CPU). This config targets the regime
# where GPU statevector simulation wins: high qubit counts. Verified on
# Kaggle T4 — 24q QFT was ~7x faster on GPU than CPU (1.34s vs 9.82s).
#
# Statevector-only on purpose:
#   - aer_statevector is the only GPU-capable method in qiskit-aer 0.15.1.
#   - aer_mps (matrix_product_state) is CPU-only in Aer; requesting device=GPU
#     for it errors at run time, so it is excluded here (it stays in the CPU
#     sweep where it belongs).
#
# Qubit ceiling note:
#   The exact-fidelity check in aer_statevector runs a CPU double-precision
#   reference (2^n * 16 bytes of host RAM). At n=28 that is ~4 GB; pushing
#   past ~28 risks host-RAM OOM / long fidelity times. 28 is the safe cap.
#
# Total combinations = circuits x qubits x depths x backends x reps
#                    = 4 x 6 x 5 x 1 x 3 = 360 (minus OOM failures)

schema_version: "0.1.0"

# Circuit types to benchmark (same generators as the CPU sweep)
circuits:
  - ghz           # maximally entangled GHZ state
  - qft           # quantum Fourier transform
  - random        # random SU(4) circuits
  - qaoa          # QAOA ansatz for MaxCut

# Qubit counts — high regime where GPU statevector pays off.
# 18-22: GPU pulls ahead of CPU
# 24-26: GPU clearly dominant
# 28:    near the T4 statevector wall (single precision ~2 GB device mem)
qubits:
  - 18
  - 20
  - 22
  - 24
  - 26
  - 28

# Circuit depths (shallow -> deep)
depths:
  - 1
  - 2
  - 4
  - 8
  - 16

# GPU-capable backends only (statevector). MPS excluded — see header.
backends:
  - aer_statevector

# Repetitions per (circuit, qubits, depth, backend) combo
repetitions: 3

# Base seed for reproducibility (rep 0 = seed_base, rep 1 = seed_base+1, ...)
seed_base: 42

# Maximum time (seconds) allowed per single benchmark before timeout
timeout_seconds: 1800

# Output directory for raw JSON files
output_dir: data/raw
