# benchmark/sweep_config_medium.yaml
# Phase 0A — medium-circuit band (16–24 qubits). Run in the NEXT Kaggle session.
#
# CPU-only for now (Kaggle T4 GPU kernels unusable: cudaErrorNoKernelImageForDevice).
# Statevector at 24q single-precision = 256 MB on CPU — fine, just slower than small.
# No 16 in the qubit grid; band = {18, 20, 22, 24}.
#
# Combinations = 4 circuits × 4 qubits × 5 depths × 2 backends × 3 reps = 480

schema_version: "0.1.0"

circuits:
  - ghz
  - qft
  - random
  - qaoa

qubits:
  - 18
  - 20
  - 22
  - 24

depths:
  - 1
  - 2
  - 4
  - 8
  - 16

backends:
  - aer_statevector
  - aer_mps

repetitions: 3
seed_base: 42
timeout_seconds: 600
output_dir: data/raw
