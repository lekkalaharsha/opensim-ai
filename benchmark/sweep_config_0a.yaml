# benchmark/sweep_config_0a.yaml
# Phase 0A Sweep Configuration
#
# Single unified config — CPU and GPU share the work automatically:
#   aer_statevector → GPU (AerConfig auto-selects when qiskit-aer-gpu is installed)
#   aer_mps         → CPU always (Aer's matrix_product_state is CPU-only in 0.15.1)
#
# Qubit range extended to 28 (verified on Kaggle T4):
#   statevector single-precision at 28q = 2 GB GPU memory (fits in 15 GB T4)
#   MPS at high qubits: OOMs are caught and logged as success=false, not crashes
#
# Total combinations = circuits × qubits × depths × backends × reps
#                    = 4 × 11 × 5 × 2 × 3 = 1320 (minus OOM failures)

schema_version: "0.1.0"

# Circuit types to benchmark
circuits:
  - ghz           # maximally entangled GHZ state
  - qft           # quantum Fourier transform
  - random        # random SU(4) circuits
  - qaoa          # QAOA ansatz for MaxCut

# Qubit counts (small → high)
# 5-15:  CPU-competitive range, both backends fast
# 18-20: GPU starts winning for statevector
# 22-28: GPU dominant; MPS still handles well due to compressed representation
qubits:
  - 5
  - 8
  - 10
  - 12
  - 15
  - 18
  - 20
  - 22
  - 24
  - 26
  - 28

# Circuit depths (shallow → deep)
# 1-2: low entanglement
# 4-8: moderate entanglement
# 16:  deep circuits, stress test for MPS bond dimension
depths:
  - 1
  - 2
  - 4
  - 8
  - 16

# Simulator backends — GPU and CPU work together in one sweep
backends:
  - aer_statevector   # GPU-accelerated when qiskit-aer-gpu is installed
  - aer_mps           # always CPU (matrix_product_state is CPU-only in Aer 0.15.1)

# Number of repetitions per (circuit, qubits, depth, backend) combo
repetitions: 3

# Base seed for reproducibility (rep 0 = seed_base, rep 1 = seed_base+1, ...)
seed_base: 42

# Maximum time (seconds) allowed per single benchmark before timeout
timeout_seconds: 1800

# Output directory for raw JSON files
output_dir: data/raw
